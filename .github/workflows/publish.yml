name: Publish Package

on:
  push:
    branches:
      - "main"
  # Лучше добавить: workflow_dispatch:  # для ручного запуска теста

permissions:
  id-token: write # обязательно для OIDC
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.JS
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Upgrade npm to latest
        run: npm install -g npm@latest

      - name: Install Protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Install deps
        run: yarn install --frozen-lockfile

      - name: Generate TS Protobuf
        run: yarn run generate

      - name: Publish package
        run: npm publish --provenance --access public
        # --provenance — для OIDC provenance
        # --access public — обязательно для scoped пакетов, если не указано в package.json
